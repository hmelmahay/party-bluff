<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Party Bluff</title>
  <style>
    :root {
      --bg: #0a1a2f;
      --card: #14293f;
      --accent: #f97316;
      --accent2: #ffb703;
      --text: #f2f6fa;
      --muted: #8fa5bb;
      --input: #081422;
      --raised: #1f3a5a;
      --hover: #24466b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 16px;
    }
    #app { width: 100%; max-width: 480px; }
    h1 { text-align: center; margin: 12px 0 4px; font-size: 2rem; letter-spacing: 1px; }
    h1 span { color: var(--accent); }
    .tagline { text-align: center; color: var(--muted); margin-bottom: 20px; font-size: 0.9rem; }
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
    }
    input[type=text] {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 2px solid transparent;
      background: var(--input);
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 10px;
    }
    input[type=text]:focus { outline: none; border-color: var(--accent); }
    select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 2px solid transparent;
      background: var(--input);
      color: var(--text);
      font-size: 1rem;
    }
    select:focus { outline: none; border-color: var(--accent); }
    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
    }
    button.secondary { background: var(--raised); }
    button:disabled { opacity: 0.45; cursor: default; }
    .choice {
      background: var(--raised);
      margin-top: 8px;
      text-align: left;
      font-weight: 600;
    }
    .choice:hover { background: var(--hover); }
    .roomcode {
      text-align: center;
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: 10px;
      color: var(--accent2);
      margin: 8px 0;
    }
    .qtext { font-size: 1.2rem; line-height: 1.5; margin-bottom: 12px; }
    .label { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    ul.players { list-style: none; }
    ul.players li {
      display: flex;
      justify-content: space-between;
      padding: 7px 4px;
      border-bottom: 1px solid var(--raised);
    }
    ul.players li:last-child { border-bottom: none; }
    .status { color: var(--accent2); font-size: 0.85rem; }
    .truth { color: var(--accent2); font-weight: 800; }
    .fooled { color: var(--accent); }
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: white;
      padding: 10px 20px;
      border-radius: 999px;
      font-weight: 700;
      display: none;
      z-index: 10;
    }
    .waiting { text-align: center; color: var(--muted); padding: 10px 0; }
    .progress { text-align: center; color: var(--muted); font-size: 0.85rem; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div id="app">
    <h1>PARTY <span>BLUFF</span></h1>
    <p class="tagline">Fool your friends. Find the truth.</p>
    <div id="screen"></div>
  </div>
  <div id="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
